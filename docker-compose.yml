version: "3.8"

services:
  football-tracker:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    image: football-tracker:latest
    container_name: football-tracker
    
    ports:
      - "8501:8501"
    
    volumes:
      # Persistent data storage
      - ./data:/app/data
      # Model cache (avoid re-downloading)
      - model-cache:/home/appuser/.cache/ultralytics
    
    environment:
      - PYTHONUNBUFFERED=1
      - STREAMLIT_SERVER_PORT=8501
      - STREAMLIT_SERVER_ADDRESS=0.0.0.0
    
    # GPU support (requires nvidia-docker2)
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    
    restart: unless-stopped

volumes:
  model-cache:
    driver: local
